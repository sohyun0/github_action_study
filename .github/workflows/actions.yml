# 이름짓기
name: Github Actions 연습하기

# on: 언제 이 작업을 실행할지 정의
# push: github에 push 할때마다 실행
on: push

# jobs: 어떤일을 실행 할지 정의
jobs:
  push-job:
    runs-on: ubuntu-latest
    # 일을 어떤 순서로 진행할지 정의
    steps:
      - name: 첫 번째 작업
        run: echo "첫 번째 작업 실행 중"

      - name: 여러가지 명령어 문장 작성하기
        run: | 
          echo "첫 번째 명령어"
          echo "두 번째 명령어"

      - name: Github Actions 자체에 저장되어 있는 변수 사용해보기
        run: | 
          echo $GITHUB_SHA
          echo $GITHUB_REPOSITORY
      
      - name: Github Actions Secret 변수 사용해보기
        run: |
          echo ${{ secrets.PROJECT_SECRET_KEY }}