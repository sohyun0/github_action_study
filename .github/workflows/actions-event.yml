# 이름
name: Github Actions 테스트 자동화하기

# 특정 브랜치를 base로 했을 때만 실행
on:
  pull_request:
    branches:
      - main
    types: [opened]

# jobs: 어떤일을 실행 할지 정의
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Github Repository 불러오기
        uses: actions/checkout@v5

      - name: Node.js 설치하기
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: 의존성(라이브러리) 설치
        run: npm ci

      - name: 테스트 실행하기
        run: npm run test
